<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MP3by4 - Sitcom Web Summarizer</title>
  <style>
    :root {
      --bg-cream: #faf8f5;
      --bg-lavender: #f2edf9;
      --pastel-purple: #a698e6;
      --pastel-purple-hover: #9384db;
      --pastel-purple-light: #ece9f7;
      --pastel-green: #74bdae;
      --pastel-green-hover: #63a89a;
      --pastel-green-light: #eef9f7;
      --pastel-peach: #fcd8cb;
      --text-dark: #423d4c;
      --text-gray: #7d7788;
      --border-radius: 12px;
      --card-shadow: 0 6px 20px rgba(166, 152, 230, 0.1);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-cream);
      color: var(--text-dark);
      padding: 15px;
      margin: 0;
      width: 360px;
      box-sizing: border-box;
    }

    /* Header */
    .header {
      background: var(--bg-lavender);
      border-radius: var(--border-radius);
      padding: 12px;
      text-align: center;
      margin-bottom: 12px;
      border: 1px solid rgba(166, 152, 230, 0.15);
    }

    .header h1 {
      font-size: 20px;
      margin: 0 0 4px 0;
      color: var(--text-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .header p {
      font-size: 11px;
      color: var(--text-gray);
      margin: 0;
      font-weight: 500;
    }

    /* Form Section */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-gray);
      margin: 8px 0 6px 0;
      text-align: left;
    }

    /* Horizontal Character Select Pills */
    .character-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .character-pill {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px;
      background: white;
      border: 2px solid #eaeaea;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 11px;
      font-weight: 600;
    }

    .character-pill:hover {
      border-color: var(--pastel-purple-light);
      background: var(--bg-cream);
    }

    .character-pill.selected {
      border-color: var(--pastel-purple);
      background: var(--pastel-purple-light);
      color: var(--text-dark);
    }

    .character-pill .avatar {
      font-size: 18px;
      margin-bottom: 2px;
    }

    /* Options block */
    .options-grid {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      background: white;
      padding: 8px 10px;
      border-radius: var(--border-radius);
      border: 1px solid #eaeaea;
    }

    .options-grid label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-gray);
    }

    .options-grid select {
      flex: 1;
      font-size: 11px;
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid #ddd;
      outline: none;
      background: white;
      cursor: pointer;
      color: var(--text-dark);
      font-weight: 500;
    }

    /* Convert Button */
    .btn-convert {
      width: 100%;
      background: var(--pastel-purple);
      color: white;
      border: none;
      padding: 10px;
      font-size: 13px;
      font-weight: 700;
      border-radius: var(--border-radius);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(166, 152, 230, 0.2);
    }

    .btn-convert:hover {
      background: var(--pastel-purple-hover);
      transform: translateY(-1px);
    }

    .btn-convert:active {
      transform: translateY(0);
    }

    .btn-convert:disabled {
      background: #ccc;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading Spinner */
    .loading-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Status Display */
    .status-container {
      margin-top: 10px;
    }

    .status-msg {
      font-size: 11px;
      font-weight: 500;
      padding: 8px 10px;
      border-radius: 8px;
      margin: 5px 0;
      text-align: left;
    }

    .status-msg.info {
      background: #eef3fc;
      color: #3b5998;
      border: 1px solid #dbe5f9;
    }

    .status-msg.error {
      background: #fdf2f2;
      color: #b82c2c;
      border: 1px solid #fbdad6;
    }

    .status-msg.success {
      background: var(--pastel-green-light);
      color: #387c6f;
      border: 1px solid rgba(116, 189, 174, 0.3);
    }

    /* Tabbed Result Section */
    .result-container {
      margin-top: 12px;
      background: white;
      border-radius: var(--border-radius);
      border: 1px solid #eaeaea;
      padding: 10px;
      box-shadow: var(--card-shadow);
      display: none;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
      margin-bottom: 8px;
      gap: 4px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 6px 2px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-gray);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      background: #f7f7f7;
      color: var(--text-dark);
    }

    .tab-btn.active {
      background: var(--pastel-purple-light);
      color: var(--pastel-purple);
    }

    .tab-pane {
      display: none;
      min-height: 180px;
      max-height: 220px;
      overflow-y: auto;
      text-align: left;
    }

    .tab-pane.active {
      display: block;
    }

    /* Pane Media Player */
    .video-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .video-wrapper video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      max-height: 170px;
    }

    /* Pane Notes & Script styling */
    .pane-content {
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-dark);
      white-space: pre-wrap;
    }

    .pane-content ul {
      margin: 0;
      padding-left: 16px;
    }

    .pane-content li {
      margin-bottom: 5px;
    }

    .action-row {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-action {
      background: var(--pastel-green);
      color: white;
      border: none;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-action:hover {
      background: var(--pastel-green-hover);
    }

    /* Hidden Radio Button inputs */
    #hiddenInputs {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 MP3by4</h1>
    <p>Convert webpage to sitcom-narrated video</p>
  </div>

  <!-- Character Pills Selector -->
  <div class="section-label">Sitcom Narrator</div>
  <div class="character-row">
    <div class="character-pill selected" id="pillRachel">
      <span class="avatar">👩</span>
      <span>Rachel Green</span>
    </div>
    <div class="character-pill" id="pillSheldon">
      <span class="avatar">🤖</span>
      <span>Sheldon Cooper</span>
    </div>
    <div class="character-pill" id="pillMichael">
      <span class="avatar">📺</span>
      <span>Michael Scott</span>
    </div>
  </div>

  <!-- hidden radio fields for easy js access -->
  <div id="hiddenInputs">
    <input type="radio" name="character" value="girl" id="charRachel" checked>
    <input type="radio" name="character" value="robot" id="charSheldon">
    <input type="radio" name="character" value="news_anchor" id="charMichael">
  </div>

  <!-- Option Dropdown -->
  <div class="options-grid">
    <label for="summaryLength">Detail Level:</label>
    <select id="summaryLength">
      <option value="short">Short & Sweet</option>
      <option value="medium" selected>Standard Brief</option>
      <option value="long">Detailed Notes</option>
    </select>
  </div>

  <!-- Convert Button -->
  <button id="extractBtn" class="btn-convert">
    <span id="btnText">Convert Webpage to Video 🚀</span>
    <span id="btnLoading" class="loading-spinner" style="display: none;"></span>
  </button>

  <!-- Status Box -->
  <div id="statusBox" class="status-container"></div>

  <!-- Tabbed Result Box -->
  <div id="resultBox" class="result-container">
    <div class="tab-bar">
      <button class="tab-btn active" id="btnTabVideo">🎬 Video</button>
      <button class="tab-btn" id="btnTabNotes">📝 Notes</button>
      <button class="tab-btn" id="btnTabScript">💬 Script</button>
    </div>

    <!-- Video Tab -->
    <div class="tab-pane active" id="paneVideo">
      <div class="video-wrapper" id="videoContainer">
        <!-- Video element will be loaded here dynamically -->
      </div>
    </div>

    <!-- Notes Tab -->
    <div class="tab-pane" id="paneNotes">
      <div class="pane-content" id="notesContent"></div>
      <div class="action-row">
        <button class="btn-action" id="copyNotesBtn">Copy Notes 📋</button>
      </div>
    </div>

    <!-- Script Tab -->
    <div class="tab-pane" id="paneScript">
      <div class="pane-content" id="scriptContent" style="background:#f7f7f7; padding:8px; border-radius:6px; font-family:monospace;"></div>
    </div>
  </div>

  <script src="robust_popup.js"></script>
</body>
</html>
